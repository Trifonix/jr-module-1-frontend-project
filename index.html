<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonders App</title>
</head>
<body>
    <!-- Делаю нулевую секцию : шапку с лого и меню -->

        <nav>
            <ul>
                <li>Wonders</li>
                <li>Mobile App</li>
                <li>FAQs</li>
                <li>Contact</li>
                <li>Sign Up</li>
            </ul>
        </nav>

    <!-- Делаю главную часть страницы -->
    <main>
        <!-- Делаю первую секцию : два блока (поиск билетов и картинка) -->
        <section>
            <!-- Левый блок с поиском -->
            <div class="main-left-container">
                <h1>Skip the Climbing,<br/>Catch the Bus</h1>
                <h2>We sell tickets to the best seats in the house – houses on wheels, that is! Get ready for jaw-dropping views without breaking a sweat.</h2>
            </div>
            <!-- Правый блок с картинкой -->
            <div class="main-right-container">
                <img src="#" alt="Beauty Mountain">
            </div>
        </section>
    </main>
    
</body>
</html>
